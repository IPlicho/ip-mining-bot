<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PG电子高仿</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:system-ui,sans-serif;max-width:480px;margin:0 auto;position:relative;height:100vh;overflow:hidden}
.page{position:absolute;top:0;left:0;width:100%;height:100%;padding:10px;display:none;overflow-y:auto}
.active{display:block}

/* 登录页 */
#login-page{background:#0a0a12;display:flex;flex-direction:column;justify-content:center}
.login-box{padding:20px;background:#111;border-radius:14px;margin:20px}
input{width:100%;padding:14px;background:#222;border:none;border-radius:10px;color:#fff;margin-bottom:12px;font-size:16px}
.btn{width:100%;padding:14px;background:#ff3d71;border:none;border-radius:10px;color:#fff;font-weight:700;margin-top:10px}

/* 顶部状态栏 (模仿游戏) */
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:#111;border-bottom:1px solid #333}
.uid{font-weight:600}
.balance{color:#ffb100;font-weight:700}

/* 游戏大厅 */
#hall-page{background:#000;padding-bottom:80px}
.game-grid{display:grid;grid-template-columns:1fr;gap:15px;margin-top:15px}
.game-card{background:#1a1a1a;border-radius:14px;overflow:hidden;border:1px solid #333}
.game-cover{height:200px;display:grid;place-items:center;font-size:60px;background:#222}
.game-info{padding:15px}
.game-title{font-size:18px;font-weight:700;margin-bottom:10px}
.play-btn{background:#ff3d71;color:#fff;border:none;width:100%;padding:12px;border-radius:10px;font-weight:700;margin-top:10px}

/* 个人中心 */
#profile-page{background:#0a0a12;padding-bottom:80px}
.profile-card{background:#111;border-radius:14px;padding:20px;margin-top:15px;border:1px solid #333}
.profile-item{display:flex;justify-content:space-between;padding:15px 0;border-bottom:1px solid #333;font-size:16px}
.logout-btn{background:#ff3d71;color:#fff;border:none;width:100%;padding:14px;border-radius:10px;font-weight:700;margin-top:20px}

/* 游戏页面 (高仿PG电子) */
#queen-game,#mahjong-game{background:url('https://img.icons8.com/fluency/960/000000/wooden-background.png') no-repeat center center;background-size:cover;padding:10px;padding-bottom:100px}
.game-top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#111;border-radius:10px;margin-bottom:10px}
.game-title-top{font-weight:700}
.game-money{color:#ffb100;font-weight:700}

/* 老虎机矩阵 (5x5) */
.slot-matrix{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin:10px auto;background:rgba(0,0,0,0.5);padding:8px;border-radius:10px}
.slot-cell{width:100%;aspect-ratio:1/1;background:#222;border:2px solid #444;border-radius:8px;display:grid;place-items:center;font-size:20px;color:#fff}
.win{border-color:#ffb100;background:#332200}

/* 控制栏 (底部按键) */
.ctrl-bar{position:fixed;bottom:0;left:0;width:100%;max-width:480px;background:#111;padding:15px;border-top:1px solid #333;display:flex;justify-content:space-around;align-items:center}
.ctrl-btn{width:50px;height:50px;border-radius:50%;background:#333;color:#fff;border:none;font-size:20px}
.ctrl-center{width:80px;height:80px;border-radius:50%;background:#ffb100;color:#000;border:none;font-size:24px;font-weight:700}
.ctrl-num{background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:16px;font-weight:700}

/* 免费旋转提示 */
.free-spin{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);padding:20px;border-radius:10px;text-align:center;display:none}
.free-title{font-size:24px;font-weight:700;color:#ffb100;margin-bottom:10px}
.free-num{font-size:40px;font-weight:700;color:#fff}

/* 金币爆分动画 */
@keyframes winAnim{0%{transform:scale(0.5);opacity:0}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
.win-text{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:700;color:#ffb100;display:none;text-shadow:0 0 10px #000}
.win-anim{display:block;animation:winAnim 0.8s}

/* 底部导航 */
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;max-width:480px;height:60px;background:#111;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #333}
.nav-item{display:flex;flex-direction:column;align-items:center;color:#999;font-size:12px}
.nav-item.active{color:#ff3d71}
.nav-icon{font-size:24px;margin-bottom:5px}
</style>
</head>
<body>

<!-- 底部控制按键 -->
<div class="ctrl-bar">

<!-- 免费旋转弹窗 -->

<!-- 5. 麻将胡了游戏页 (1:1高仿) -->
<div id="mahjong-game" class="page">

<!-- 顶部金元宝倍率 -->
<div style="text-align:center;margin:10px 0">

<!-- 底部控制 -->

<!-- 底部导航栏 -->
<div class="bottom-nav">

</div>

</div>
</div>
