<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>好友棋牌 - 麻将·斗地主·跑得快</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b1018;color:#fff;font-family:system-ui}
.page{display:none;padding:16px}
.show{display:block}
input{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:none;background:#1e293b;color:#fff}
button{width:100%;padding:14px;margin:8px 0;border-radius:10px;border:none;background:#10b981;color:#fff;font-weight:bold}
.btn-red{background:#ef4444}
.btn-blue{background:#3b82f6}
.card{background:#1e293b;border-radius:14px;padding:16px;margin:10px 0}
.title{font-size:20px;font-weight:bold;margin-bottom:12px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#111827;display:flex;height:65px}
.nav-item{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#9ca3af}
.nav-item.active{color:#10b981}
</style>
</head>
<body>

<!-- 登录 -->
<div id="login" class="page show">
  <div class="card" style="margin-top:60px">
    <div class="title">登录</div>
    <input id="user" placeholder="输入用户名">
    <button onclick="login()">登录</button>
    <button class="btn-blue" onclick="reg()">注册</button>
  </div>
</div>

<!-- 大厅 -->
<div id="hall" class="page">
  <div class="card">
    <div>用户：<span id="uname"></span></div>
    <div>积分：<span id="score" style="color:#10b981"></span></div>
  </div>

  <div class="card" onclick="go('majiang')">
    <h3>🀄 麻将</h3>
    <p>好友房 / 随机拼桌</p>
    <button class="btn-blue" style="margin-top:10px">进入游戏</button>
  </div>

  <div class="card" onclick="go('ddz')">
    <h3>🃏 斗地主</h3>
    <p>好友房 / 随机拼桌</p>
    <button class="btn-blue" style="margin-top:10px">进入游戏</button>
  </div>

  <div class="card" onclick="go('paodekuai')">
    <h3>🏃‍♂️ 跑得快</h3>
    <p>好友房 / 随机拼桌</p>
    <button class="btn-blue" style="margin-top:10px">进入游戏</button>
  </div>
</div>

<!-- 麻将 -->
<div id="majiang" class="page">
  <div class="title">🀄 麻将</div>
  <div class="card">
    <button onclick="createRoom('majiang')">创建房间（邀好友）</button>
    <button class="btn-blue" onclick="matchTable('majiang')">随机拼桌</button>
    <button onclick="go('hall')">返回大厅</button>
  </div>
</div>

<!-- 斗地主 -->
<div id="ddz" class="page">
  <div class="title">🃏 斗地主</div>
  <div class="card">
    <button onclick="createRoom('ddz')">创建房间（邀好友）</button>
    <button class="btn-blue" onclick="matchTable('ddz')">随机拼桌</button>
    <button onclick="go('hall')">返回大厅</button>
  </div>
</div>

<!-- 跑得快 -->
<div id="paodekuai" class="page">
  <div class="title">🏃‍♂️ 跑得快</div>
  <div class="card">
    <button onclick="createRoom('paodekuai')">创建房间（邀好友）</button>
    <button class="btn-blue" onclick="matchTable('paodekuai')">随机拼桌</button>
    <button onclick="go('hall')">返回大厅</button>
  </div>
</div>

<!-- 房间 -->
<div id="room" class="page">
  <div class="title">房间号：<span id="roomid"></span></div>
  <div class="card">
    <div id="players"></div>
    <button onclick="startGame()">开始游戏</button>
    <button class="btn-red" onclick="go('hall')">退出房间</button>
  </div>
</div>

<!-- 游戏 -->
<div id="game" class="page">
  <div class="title">游戏中</div>
  <div class="card">
    <div id="result"></div>
    <button onclick="win()">我赢了 +10 积分</button>
    <button class="btn-red" onclick="lose()">我输了 -10 积分</button>
    <button onclick="go('hall')">结束游戏</button>
  </div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="go('hall')">
    <div>🎮</div>
    <div>大厅</div>
  </div>
  <div class="nav-item" onclick="showInfo()">
    <div>👤</div>
    <div>我的</div>
  </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || {}
let now = null
let room = null

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'))
  document.getElementById(id).classList.add('show')
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))
  if(id==='hall')document.querySelector('.nav-item').classList.add('active')
}

function go(id){
  if(!now && id!='login'){alert('请登录');return show('login')}
  show(id)
}

function reg(){
  let u = document.getElementById('user').value
  if(!u || users[u])return alert('用户名已存在或为空')
  users[u]={score:100}
  localStorage.setItem('users',JSON.stringify(users))
  alert('注册成功')
}

function login(){
  let u = document.getElementById('user').value
  if(!users[u])return alert('用户不存在')
  now = u
  refresh()
  go('hall')
}

function refresh(){
  if(!now)return
  document.getElementById('uname').innerText=now
  document.getElementById('score').innerText=users[now].score
}

function createRoom(g){
  room = {game:g,id:Math.floor(1000+Math.random()*9000),p:[now]}
  document.getElementById('roomid').innerText=room.id
  document.getElementById('players').innerHTML='<p>玩家：'+now+'</p>'
  go('room')
}

function matchTable(g){
  alert('匹配成功！进入游戏')
  go('game')
}

function startGame(){
  alert('游戏开始！')
  go('game')
}

function win(){
  users[now].score += 10
  localStorage.setItem('users',JSON.stringify(users))
  refresh()
  document.getElementById('result').innerText='你赢了 +10 积分'
}

function lose(){
  users[now].score -= 10
  localStorage.setItem('users',JSON.stringify(users))
  refresh()
  document.getElementById('result').innerText='你输了 -10 积分'
}

function showInfo(){
  alert('用户：'+now+'\n积分：'+users[now].score)
}
</script>
</body>
</html>
