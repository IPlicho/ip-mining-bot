<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线麻将平台</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            min-height:100vh;
            background:linear-gradient(135deg, #27ae60, #2ecc71);
            color:white;
            font-family:"微软雅黑",sans-serif;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:2rem;
        }
        .box{
            width:100%;
            max-width:400px;
            background:rgba(255,255,255,0.1);
            padding:2rem;
            border-radius:16px;
            backdrop-filter:blur(10px);
        }
        h1{
            text-align:center;
            margin-bottom:2rem;
            font-size:2rem;
            text-shadow:2px 2px 4px rgba(0,0,0,0.2);
        }
        input{
            width:100%;
            padding:1rem;
            margin:0.5rem 0;
            border:none;
            border-radius:10px;
            font-size:1rem;
        }
        button{
            width:100%;
            padding:1rem;
            margin:1rem 0 0;
            background:white;
            color:#27ae60;
            border:none;
            border-radius:50px;
            font-size:1.2rem;
            font-weight:bold;
            cursor:pointer;
            transition:transform 0.2s;
        }
        button:hover{
            transform:translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🎮 在线麻将平台</h1>
        <input id="uid" placeholder="输入你的账号（如 liyongfa）" value="liyongfa">
        <button onclick="login()">登录进入大厅</button>
    </div>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
        const socket = io();
        function login(){
            const uid = document.getElementById("uid").value;
            if(!uid)return alert("请输入账号");
            localStorage.uid = uid;
            socket.emit("login", {uid:uid});
        }
        socket.on("login_ok", d=>{
            location.href = "/hall";
        });
    </script>
</body>
</html>
