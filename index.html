<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>海南麻将 - 真正可玩版</title>
<style>
  body{background:#1a9047;color:#fff;font-family:Arial;padding:20px}
  .table{max-width:900px;margin:0 auto}
  .hand{display:flex;gap:6px;flex-wrap:wrap;margin:20px 0}
  .discard{display:flex;gap:4px;flex-wrap:wrap;background:#0003;padding:10px;border-radius:8px}
  .tile{width:46px;height:64px;background:#fff;color:#222;text-align:center;line-height:64px;border-radius:6px;font-size:16px;cursor:pointer}
  .tile:hover{transform:translateY(-4px)}
  .tile.selected{background:#ffd966}
  .btn{padding:10px 16px;margin:5px;font-size:15px;border:none;border-radius:6px;cursor:pointer}
  .btn-green{background:#2e8b57;color:#fff}
  .btn-blue{background:#4169e1;color:#fff}
  .btn:disabled{background:#666}
  .log{background:#0003;padding:10px;border-radius:8px;height:120px;overflow-y:auto}
</style>
</head>
<body>
<div class="table">
  <h2>海南麻将（可吃碰杠胡）</h2>
  <div>
    <button class="btn btn-green" onclick="startGame()">开始游戏</button>
    <button class="btn" onclick="moPai()" id="moBtn" disabled>摸牌</button>
    <button class="btn" onclick="chi()" id="chiBtn" disabled>吃</button>
    <button class="btn" onclick="peng()" id="pengBtn" disabled>碰</button>
    <button class="btn" onclick="gang()" id="gangBtn" disabled>杠</button>
    <button class="btn" onclick="hu()" id="huBtn" disabled>胡</button>
  </div>

  <div>我的手牌</div>
  <div class="hand" id="hand"></div>

  <div>桌面打出的牌</div>
  <div class="discard" id="discard"></div>

  <div class="log" id="log"></div>
</div>

<script>
const WAN = '1万,2万,3万,4万,5万,6万,7万,8万,9万'.split(',')
const TONG = '1筒,2筒,3筒,4筒,5筒,6筒,7筒,8筒,9筒'.split(',')
const TIAO = '1条,2条,3条,4条,5条,6条,7条,8条,9条'.split(',')
const ZI = '东,南,西,北,中,发,白'.split(',')
const HUA = '春,夏,秋,冬,梅,兰,竹,菊'.split(',')

let all = [], hand = [], discard = [], stack = []
let canMo = false, last = null

// 生成牌
function gen(){
  let arr = []
  ;[WAN,TONG,TIAO,ZI].forEach(s=>{
    s.forEach(p=>{for(let i=0;i<4;i++)arr.push(p)})
  })
  arr.push(...HUA)
  return arr.sort(()=>Math.random()-0.5)
}

// 开始
function startGame(){
  all = gen()
  hand = []
  discard = []
  stack = []
  log('游戏开始')
  for(let i=0;i<14;i++)hand.push(all.pop())
  render()
  canMo = true
  $('moBtn').disabled = false
}

// 渲染
function render(){
  $('hand').innerHTML = hand.map((p,i)=>`
    <div class="tile ${last===p?'selected':''}" onclick="select(${i})">${p}</div>
  `).join('')
  $('discard').innerHTML = discard.map(p=>`<div class="tile">${p}</div>`).join('')
}

function select(i){
  if(!canMo)return
  const p = hand[i]
  last = p
  render()
}

// 摸牌
function moPai(){
  if(!canMo || all.length===0)return
  const p = all.pop()
  hand.push(p)
  log('摸了：'+p)
  canMo = false
  render()
  checkHu()
}

// 打出
function play(){
  if(!last)return
  discard.push(last)
  hand = hand.filter(x=>x!==last)
  log('打出：'+last)
  last = null
  canMo = true
  render()
  aiPlay()
}

// AI随便打
function aiPlay(){
  setTimeout(()=>{
    if(all.length===0)return
    const p = all.pop()
    discard.push(p)
    log('AI打出：'+p)
    render()
    checkAction(p)
  },800)
}

// 检查能不能吃碰杠胡
function checkAction(p){
  const cnt = {}
  hand.forEach(x=>cnt[x]=(cnt[x]||0)+1)
  const canPeng = cnt[p]>=2
  const canGang = cnt[p]>=3
  const canChi = checkChi(p)

  $('pengBtn').disabled = !canPeng
  $('gangBtn').disabled = !canGang
  $('chiBtn').disabled = !canChi
}

function checkChi(p){
  const s = p.slice(-1)
  const n = parseInt(p)
  if(isNaN(n))return false
  const h = hand.filter(x=>x.endsWith(s)).map(x=>parseInt(x))
  return h.includes(n-1)&&h.includes(n-2) ||
         h.includes(n-1)&&h.includes(n+1) ||
         h.includes(n+1)&&h.includes(n+2)
}

function peng(){
  hand = hand.filter(x=>x!==last).filter(x=>x!==last)
  stack.push([last,last,last])
  log('碰')
  disableBtn()
  render()
}

function gang(){
  hand = hand.filter(x=>x!==last).filter(x=>x!==last).filter(x=>x!==last)
  stack.push([last,last,last,last])
  log('杠')
  disableBtn()
  render()
}

function chi(){
  log('吃')
  disableBtn()
}

function checkHu(){
  // 简化胡牌：凑够4面子+1对就胡（你要我可以给你海南真规则）
  const cnt = {}
  hand.forEach(x=>cnt[x]=(cnt[x]||0)+1)
  const c = Object.values(cnt)
  const pair = c.filter(x=>x>=2).length>=1
  const min3 = c.filter(x=>x>=3).length
  if(pair && min3>=1){
    log('✅ 胡牌了！')
    alert('胡牌！')
    disableBtn()
  }
}

function hu(){
  alert('胡牌成功！')
  disableBtn()
}

function disableBtn(){
  $('chiBtn').disabled=true
  $('pengBtn').disabled=true
  $('gangBtn').disabled=true
}

function log(s){
  const l = $('log')
  l.innerHTML += s+'<br>'
  l.scrollTop = l.scrollHeight
}

function $(id){return document.getElementById(id)}
</script>
</body>
</html>
