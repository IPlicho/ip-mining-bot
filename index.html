<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏大厅</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;color:#fff;font-family:Arial}
  .page{display:none;padding:16px}
  .show{display:block}
  input{width:100%;padding:14px;margin:8px 0;border-radius:8px;border:none;background:#222;color:#fff}
  button{width:100%;padding:14px;margin:8px 0;border-radius:8px;border:none;background:#ff3d71;color:#fff;font-weight:bold}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#151515;display:flex;height:60px}
  .nav-btn{flex:1;display:flex;align-items:center;justify-content:center;color:#999;flex-direction:column}
  .nav-btn.active{color:#ff3d71}
  .game-list{margin-top:16px}
  .game-item{background:#222;padding:16px;border-radius:12px;margin-bottom:12px}
  .profile{background:#222;padding:20px;border-radius:12px;margin-top:16px}
  .item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #333}
</style>
</head>
<body>

<!-- 登录 -->
<div id="login" class="page show">
  <h2 style="text-align:center;margin:20px 0">登录</h2>
  <input id="login_id" placeholder="用户名">
  <input id="login_pw" type="password" placeholder="密码">
  <button onclick="login()">登录</button>
  <button onclick="go('reg')">注册</button>
</div>

<!-- 注册 -->
<div id="reg" class="page">
  <h2 style="text-align:center;margin:20px 0">注册</h2>
  <input id="reg_id" placeholder="用户名">
  <input id="reg_pw" type="password" placeholder="密码">
  <button onclick="reg()">注册</button>
  <button onclick="go('login')">返回登录</button>
</div>

<!-- 大厅 -->
<div id="hall" class="page">
  <div style="padding:12px;background:#222;border-radius:8px;margin-bottom:12px">
    <div>用户：<span id="uname"></span></div>
    <div>余额：<span id="umoney" style="color:#ffb100"></span></div>
  </div>
  <div class="game-list">
    <div class="game-item" onclick="go('queen')">
      <h3>赏金女王</h3>
      <button style="margin-top:10px">开始游戏</button>
    </div>
    <div class="game-item" onclick="go('mahjong')">
      <h3>麻将胡了</h3>
      <button style="margin-top:10px">开始游戏</button>
    </div>
  </div>
</div>

<!-- 个人中心 -->
<div id="profile" class="page">
  <div class="profile">
    <div class="item"><div>用户名</div><div id="p_name"></div></div>
    <div class="item"><div>余额</div><div id="p_money" style="color:#ffb100"></div></div>
    <div class="item"><div>游戏次数</div><div id="p_times"></div></div>
  </div>
  <button onclick="logout()">退出登录</button>
</div>

<!-- 赏金女王 -->
<div id="queen" class="page">
  <h2 style="text-align:center;padding:16px">赏金女王</h2>
  <div style="text-align:center;padding:16px">
    <div>余额：<span id="q_money"></span></div>
    <button onclick="spin_q()">开始旋转</button>
  </div>
  <button onclick="go('hall')">返回大厅</button>
</div>

<!-- 麻将胡了 -->
<div id="mahjong" class="page">
  <h2 style="text-align:center;padding:16px">麻将胡了</h2>
  <div style="text-align:center;padding:16px">
    <div>余额：<span id="m_money"></span></div>
    <button onclick="spin_m()">开始旋转</button>
  </div>
  <button onclick="go('hall')">返回大厅</button>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
  <div class="nav-btn active" onclick="go('hall')">
    <div>🎮</div>
    <div>大厅</div>
  </div>
  <div class="nav-btn" onclick="go('profile')">
    <div>👤</div>
    <div>个人中心</div>
  </div>
</div>

<script>
let user = null
let users = JSON.parse(localStorage.getItem('users')) || {}

function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'))
  document.getElementById(id).classList.add('show')
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'))
  if(id==='hall')document.querySelector('.nav-btn').classList.add('active')
  if(id==='profile')document.querySelectorAll('.nav-btn')[1].classList.add('active')
}

function go(id){
  if(id!=='login'&&id!=='reg'&&!user){
    alert('请先登录')
    return show('login')
  }
  show(id)
  refresh()
}

function refresh(){
  if(!user)return
  const u = users[user]
  document.getElementById('uname').innerText = user
  document.getElementById('umoney').innerText = u.money.toFixed(2)
  document.getElementById('p_name').innerText = user
  document.getElementById('p_money').innerText = u.money.toFixed(2)
  document.getElementById('p_times').innerText = u.times||0
  document.getElementById('q_money').innerText = u.money.toFixed(2)
  document.getElementById('m_money').innerText = u.money.toFixed(2)
}

function reg(){
  const id = document.getElementById('reg_id').value
  const pw = document.getElementById('reg_pw').value
  if(!id||!pw)return alert('请填写完整')
  if(users[id])return alert('已存在')
  users[id] = {pwd:pw,money:1000,times:0}
  localStorage.setItem('users',JSON.stringify(users))
  alert('注册成功')
  show('login')
}

function login(){
  const id = document.getElementById('login_id').value
  const pw = document.getElementById('login_pw').value
  if(!users[id]||users[id].pwd!==pw)return alert('账号或密码错误')
  user = id
  go('hall')
}

function logout(){
  user = null
  show('login')
}

function spin_q(){
  const u = users[user]
  u.money -= 0.8
  u.times = (u.times||0)+1
  if(Math.random()>0.7)u.money += 10
  localStorage.setItem('users',JSON.stringify(users))
  refresh()
}

function spin_m(){
  const u = users[user]
  u.money -= 0.4
  u.times = (u.times||0)+1
  if(Math.random()>0.65)u.money += 8
  localStorage.setItem('users',JSON.stringify(users))
  refresh()
}
</script>
</body>
</html>
