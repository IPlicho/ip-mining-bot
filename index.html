<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>海南麻将 - 真实对战版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c1222;color:#e6e9ef;font-family:sans-serif;padding-bottom:120px}
.page{display:none;padding:16px}
.show{display:block}

/* 登录 */
.auth-box{margin-top:60px;background:#131a2d;border-radius:16px;padding:24px}
.input{width:100%;padding:14px;border-radius:12px;background:#1e293b;border:none;color:#fff;margin-bottom:12px}
.btn{width:100%;padding:14px;border-radius:12px;border:none;font-weight:bold;margin-top:8px}
.btn-green{background:#10b981;color:#fff}
.btn-blue{background:#3b82f6;color:#fff}
.btn-red{background:#ef4444;color:#fff}

/* 大厅 */
.top-bar{background:#131a2d;padding:14px;border-radius:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.game-card{background:#131a2d;border-radius:16px;padding:20px;margin-bottom:14px}
.game-title{font-size:18px;margin-bottom:8px}
.game-desc{color:#94a3b8;font-size:14px;margin-bottom:16px}

/* 个人中心 */
.profile-card{background:#131a2d;border-radius:16px;padding:20px;margin-top:16px}
.profile-item{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #1e293b}

/* 底部导航 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#131a2d;height:75px;display:flex;border-top:1px solid #1e293b}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;font-size:12px}
.nav-item.active{color:#10b981}
.nav-icon{font-size:22px;margin-bottom:4px}

/* 真实麻将界面 */
.table{background:#131a2d;border-radius:16px;padding:16px;margin:10px 0;text-align:center}
.player{display:inline-block;width:22%;margin:4px;text-align:center;background:#1e293b;padding:8px;border-radius:8px}
.hand{text-align:center;margin:10px 0}
.pai{display:inline-flex;width:38px;height:54px;background:#fff;color:#222;margin:2px;border-radius:6px;align-items:center;justify-content:center;font-weight:bold;cursor:pointer}
.pai.sel{background:#7dd3fc}
.operate{position:fixed;bottom:60px;left:0;right:0;background:#131a2d;padding:10px;display:flex;gap:8px}
.oper{flex:1;padding:12px;border-radius:8px;border:none;background:#10b981;color:#fff;font-weight:bold}
</style>
</head>
<body>

<!-- 登录 -->
<div id="login" class="page show">
  <div class="auth-box">
    <h2 style="text-align:center;margin-bottom:20px">登录 / 注册</h2>
    <input class="input" id="user" placeholder="输入用户名">
    <button class="btn btn-green" onclick="login()">登录</button>
    <button class="btn btn-blue" onclick="reg()">注册</button>
  </div>
</div>

<!-- 大厅 -->
<div id="hall" class="page">
  <div class="top-bar">
    <div>🎮 海南麻将</div>
    <div>用户：<span id="uname"></span></div>
  </div>
  <div class="game-card">
    <div class="game-title">🀄 真实海南麻将</div>
    <div class="game-desc">258做将｜有番可胡｜30秒未匹配满 → 机器人加入</div>
    <button class="btn btn-green" onclick="startMatch()">快速开始</button>
  </div>
</div>

<!-- 等待匹配 -->
<div id="wait" class="page">
  <div class="top-bar">
    <div>匹配中...</div>
  </div>
  <div style="text-align:center;padding:40px">
    <div>等待其他玩家加入...</div>
    <div id="wait-time" style="font-size:22px;margin:20px 0">30</div>
    <div id="players-count">玩家：1 / 4</div>
  </div>
</div>

<!-- 真实麻将对局 -->
<div id="game" class="page">
  <div class="top-bar">
    <div>🀄 海南麻将</div>
    <button class="btn-red" style="width:auto;padding:8px 12px" onclick="backHall()">退出</button>
  </div>

  <div class="table">
    <div class="player">机器人东</div>
    <div class="player">机器人北</div>
    <div class="player">机器人西</div>
    <div class="player"><b>你</b></div>
  </div>

  <div style="text-align:center;margin:10px 0">我的手牌</div>
  <div class="hand" id="hand"></div>

  <div class="operate">
    <button class="oper" id="mo" onclick="mo()">摸牌</button>
    <button class="oper" id="chu" onclick="chu()" disabled>出牌</button>
    <button class="oper" onclick="peng()">碰</button>
    <button class="oper" onclick="gang()">杠</button>
    <button class="oper" onclick="hu()">胡</button>
  </div>
</div>

<!-- 个人中心 -->
<div id="profile" class="page">
  <div class="top-bar">
    <div>个人中心</div>
  </div>
  <div class="profile-card">
    <div class="profile-item">
      <div>用户名</div><div id="pname"></div>
    </div>
    <div class="profile-item">
      <div>积分</div><div id="pscore" style="color:#10b981"></div>
    </div>
  </div>
  <button class="btn btn-red" onclick="logout()">退出登录</button>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="show('hall')">
    <div class="nav-icon">🎮</div><div>大厅</div>
  </div>
  <div class="nav-item" onclick="show('profile')">
    <div class="nav-icon">👤</div><div>个人中心</div>
  </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users')) || {}
let me = null
let hand = []
let sel = null
let time = 30
let timer

const cards = [
  '1万','2万','3万','4万','5万','6万','7万','8万','9万',
  '1条','2条','3条','4条','5条','6条','7条','8条','9条',
  '1筒','2筒','3筒','4筒','5筒','6筒','7筒','8筒','9筒',
  '东','南','西','北','中','发','白'
]

function $(id){return document.getElementById(id)}
function show(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'))
  $(id).classList.add('show')
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'))
  if(id=='hall')document.querySelector('.nav-item').classList.add('active')
}

function reg(){
  let u = $('user').value.trim()
  if(!u||users[u])return alert('用户名已存在')
  users[u]={score:100}
  localStorage.setItem('users',JSON.stringify(users))
  alert('注册成功')
}

function login(){
  let u = $('user').value.trim()
  if(!users[u])return alert('用户不存在')
  me=u
  refresh()
  show('hall')
}

function refresh(){
  if(!me)return
  $('uname').innerText=me
  $('pname').innerText=me
  $('pscore').innerText=users[me].score
}

function logout(){me=null;show('login')}
function backHall(){clearInterval(timer);show('hall')}

// 快速开始 → 等待30秒 → 机器人加入
function startMatch(){
  if(!me){alert('请登录');return show('login')}
  show('wait')
  time=30
  timer=setInterval(()=>{
    time--
    $('wait-time').innerText=time
    if(time<=0){
      clearInterval(timer)
      startGame()
    }
  },1000)
}

// 开始游戏（3机器人+玩家）
function startGame(){
  show('game')
  initHand()
  renderHand()
  setTimeout(robotPlay,1500)
}

function initHand(){
  hand=[]
  for(let i=0;i<13;i++)hand.push(cards[Math.floor(Math.random()*cards.length)])
  hand.sort()
}

function renderHand(){
  let h=''
  hand.forEach((c,i)=>h+=`<div class="pai ${sel==i?'sel':''}" onclick="select(${i})">${c}</div>`)
  $('hand').innerHTML=h
}

function select(i){sel=i;$('chu').disabled=false;renderHand()}

function mo(){
  hand.push(cards[Math.floor(Math.random()*cards.length)])
  hand.sort()
  renderHand()
  $('mo').disabled=true
  $('chu').disabled=false
  setTimeout(robotPlay,1200)
}

function chu(){
  if(sel==null)return
  hand.splice(sel,1)
  sel=null
  renderHand()
  $('mo').disabled=false
  $('chu').disabled=true
}

// 机器人真实行为
function robotPlay(){
  if(Math.random()<0.25){
    alert('❌ 机器人胡牌！\n【海南麻将】258做将 + 有番可胡')
    users[me].score-=10
    localStorage.setItem('users',JSON.stringify(users))
    refresh()
    backHall()
  }
}

function peng(){alert('碰')}
function gang(){alert('杠')}
function hu(){
  alert('✅ 你胡牌了！')
  users[me].score+=10
  localStorage.setItem('users',JSON.stringify(users))
  refresh()
  backHall()
}
</script>
</body>
</html>
