<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将平台</title>
    <style>
        body{background:#27ae60;color:white;text-align:center;padding:2rem}
        input,button{width:100%;padding:1rem;margin:0.5rem 0;border-radius:10px;border:none}
        button{background:white;color:#27ae60;font-weight:bold}
    </style>
</head>
<body>
<h2>在线麻将平台</h2>
<input id="uid" placeholder="输入账号" value="liyongfa">
<button onclick="login()">登录进大厅</button>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
const socket = io();
function login(){
    let uid = document.getElementById("uid").value;
    localStorage.uid = uid;
    socket.emit("login", {uid:uid});
}
socket.on("login_ok",()=>{
    location.href="/hall"
})
</script>
</body>
</html>
