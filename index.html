<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>海南麻将</title>
  <style>
    body {
      background: #1a9047;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    .pai {
      display: inline-block;
      width: 50px;
      height: 70px;
      background: white;
      color: #222;
      text-align: center;
      line-height: 70px;
      margin: 4px;
      border-radius: 6px;
      font-size: 18px;
      box-shadow: 0 2px 3px #0004;
    }
    .hua {
      background: #ffd966;
      color: #884411;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>海南麻将 · 纯网页版</h1>
  <button onclick="fapai()">发牌</button>
  <h3>手牌</h3>
  <div id="show_pai"></div>
  <h3>花牌</h3>
  <div id="show_hua"></div>

  <script>
    // 生成麻将
    function fapai() {
      const 万 = ['1万','2万','3万','4万','5万','6万','7万','8万','9万'];
      const 筒 = ['1筒','2筒','3筒','4筒','5筒','6筒','7筒','8筒','9筒'];
      const 条 = ['1条','2条','3条','4条','5条','6条','7条','8条','9条'];
      const 字 = ['东','南','西','北','中','发','白'];
      const 花 = ['春','夏','秋','冬','梅','兰','竹','菊'];

      let 全部牌 = [];
      // 万筒条字各4张
      [万,筒,条,字].forEach(类 => {
        类.forEach(p => 全部牌.push(p,p,p,p));
      });
      // 花牌各1张
      全部牌.push(...花);

      // 洗牌
      全部牌.sort(() => Math.random() - 0.5);

      // 发13张
      let 手牌 = 全部牌.slice(0,13);
      let 花牌 = 手牌.filter(p => 花.includes(p));
      let 普通牌 = 手牌.filter(p => !花.includes(p));

      // 显示
      document.getElementById('show_pai').innerHTML = 
        普通牌.map(p => `<div class="pai">${p}</div>`).join('');
      
      document.getElementById('show_hua').innerHTML = 
        花牌.map(p => `<div class="pai hua">${p}</div>`).join('');
    }
  </script>
</body>
</html>
