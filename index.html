<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海南麻将 · 完整成品版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
            user-select: none;
        }
        body {
            background: #1a5f35;
            color: #fff;
            overflow: hidden;
        }
        /* 全局弹窗（噶数选择） */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-content {
            background: #2d5a3d;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 3px solid #d4af37;
        }
        .modal-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #ffd700;
        }
        .ga-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .ga-btn {
            padding: 15px 30px;
            font-size: 1.5rem;
            border: none;
            border-radius: 8px;
            background: #d4af37;
            color: #8b4513;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ga-btn.active {
            background: #87ceeb;
            color: #fff;
            transform: scale(1.1);
        }
        .ga-btn:hover {
            transform: scale(1.05);
        }
        .confirm-btn {
            margin-top: 20px;
            padding: 12px 40px;
            font-size: 1.3rem;
            background: #4169e1;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* 牌桌容器 */
        .table-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: none;
        }
        /* 玩家座位 */
        .seat {
            position: absolute;
            width: 200px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .seat.top { top: 0; left: 50%; transform: translateX(-50%); }
        .seat.right { top: 50%; right: 0; transform: translateY(-50%); }
        .seat.bottom { bottom: 0; left: 50%; transform: translateX(-50%); }
        .seat.left { top: 50%; left: 0; transform: translateY(-50%); }

        .seat-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            background: #fff;
            overflow: hidden;
        }
        .seat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .seat-info {
            margin-top: 5px;
            text-align: center;
        }
        .seat-name { font-size: 1rem; }
        .seat-score { font-size: 1.2rem; color: #ffd700; font-weight: bold; }
        .seat-zhuang {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff6347;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .seat-ga {
            position: absolute;
            top: -5px;
            left: -5px;
            background: #d4af37;
            color: #8b4513;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* 牌墙 */
        .wall {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 80px;
            background: #1e5799;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            border: 3px solid #d4af37;
        }
        .wall-timer {
            position: absolute;
            top: -30px;
            font-size: 1.2rem;
            color: #ffd700;
        }

        /* 桌面牌池 */
        .discard-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 40%;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* 玩家手牌 */
        .player-hand {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            z-index: 10;
        }
        .tile {
            width: 50px;
            height: 70px;
            background: #fff;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }
        .tile.back {
            background: #1e5799;
            background-image: linear-gradient(to bottom, #1e5799 0%, #2989d8 100%);
            color: transparent;
            cursor: default;
        }
        .tile.flower {
            background: #ffd700;
            color: #8b4513;
        }
        .tile.selected {
            transform: translateY(-15px);
            border: 3px solid #ff6347;
        }
        .tile:hover:not(.back) {
            transform: translateY(-10px);
        }

        /* 操作按钮 */
        .action-buttons {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 20;
        }
        .action-btn {
            padding: 12px 24px;
            font-size: 1.3rem;
            border: none;
            border-radius: 8px;
            background: #4169e1;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }
        .action-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .action-btn:hover:not(:disabled) {
            background: #1e90ff;
        }

        /* 结算弹窗 */
        .settle-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .settle-content {
            background: #2d5a3d;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            border: 3px solid #ffd700;
        }
        .settle-title {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 20px;
        }
        .settle-score {
            font-size: 1.5rem;
            margin: 10px 0;
        }
        .settle-multi {
            font-size: 1.8rem;
            color: #ff6347;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 噶数选择弹窗 -->
    <div class="modal" id="gaModal">
        <div class="modal-content">
            <div class="modal-title">请选择您上噶的倍数</div>
            <div class="ga-buttons">
                <button class="ga-btn" data-ga="0">无噶</button>
                <button class="ga-btn" data-ga="1">1噶</button>
                <button class="ga-btn" data-ga="2">2噶</button>
                <button class="ga-btn" data-ga="3">3噶</button>
                <button class="ga-btn" data-ga="4">4噶</button>
                <button class="ga-btn" data-ga="5">5噶</button>
            </div>
            <button class="confirm-btn" id="confirmGa">确认</button>
        </div>
    </div>

    <!-- 牌桌 -->
    <div class="table-container" id="tableContainer">
        <!-- 座位 -->
        <div class="seat top" id="seatTop">
            <div class="seat-avatar"><img src="https://picsum.photos/200/200?random=1" alt="对手1"></div>
            <div class="seat-info">
                <div class="seat-name">小丑竟是我自己</div>
                <div class="seat-score">35万</div>
            </div>
            <div class="seat-ga" id="gaTop">4噶</div>
        </div>
        <div class="seat right" id="seatRight">
            <div class="seat-avatar"><img src="https://picsum.photos/200/200?random=2" alt="对手2"></div>
            <div class="seat-info">
                <div class="seat-name">猫咪</div>
                <div class="seat-score">33万</div>
            </div>
            <div class="seat-ga" id="gaRight">5噶</div>
        </div>
        <div class="seat bottom" id="seatBottom">
            <div class="seat-avatar"><img src="https://picsum.photos/200/200?random=3" alt="自己"></div>
            <div class="seat-info">
                <div class="seat-name">我</div>
                <div class="seat-score">38万</div>
            </div>
            <div class="seat-zhuang" id="zhuangBottom">庄</div>
            <div class="seat-ga" id="gaBottom">无噶</div>
        </div>
        <div class="seat left" id="seatLeft">
            <div class="seat-avatar"><img src="https://picsum.photos/200/200?random=4" alt="对手3"></div>
            <div class="seat-info">
                <div class="seat-name">小姐姐</div>
                <div class="seat-score">24万</div>
            </div>
            <div class="seat-ga" id="gaLeft">3噶</div>
        </div>

        <!-- 牌墙 -->
        <div class="wall" id="wall">
            <div class="wall-timer" id="wallTimer">10</div>
            <span id="wallCount">144</span>张
        </div>

        <!-- 桌面牌池 -->
        <div class="discard-area" id="discardArea"></div>

        <!-- 玩家手牌 -->
        <div class="player-hand" id="playerHand"></div>

        <!-- 操作按钮 -->
        <div class="action-buttons">
            <button class="action-btn" id="btnChi" disabled>吃</button>
            <button class="action-btn" id="btnPeng" disabled>碰</button>
            <button class="action-btn" id="btnGang" disabled>杠</button>
            <button class="action-btn" id="btnHu" disabled>胡</button>
            <button class="action-btn" id="btnGuo" disabled>过</button>
        </div>
    </div>

    <!-- 结算弹窗 -->
    <div class="settle-modal" id="settleModal">
        <div class="settle-content">
            <div class="settle-title" id="settleTitle">胡牌！</div>
            <div class="settle-multi" id="settleMulti">再赢240倍</div>
            <div class="settle-score" id="settleScore">得分：720万</div>
            <button class="confirm-btn" id="nextGame">下一局</button>
        </div>
    </div>

    <script>
        // ==================== 海南麻将核心常量 ====================
        const SUITS = ['万', '筒', '条'];
        const NUMBERS = ['1','2','3','4','5','6','7','8','9'];
        const HONORS = ['东','南','西','北','中','发','白'];
        const FLOWERS = ['春','夏','秋','冬','梅','兰','竹','菊'];
        const ALL_HONORS = [...HONORS, ...FLOWERS];

        // 牌型倍数
        const HAND_MULTIPLIER = {
            "平胡": 1,
            "碰碰胡": 2,
            "混一色": 2,
            "清一色": 3,
            "七对": 2,
            "十三幺": 13
        };

        // 基础分（底分3万）
        const BASE_SCORE = 30000;
        const SCORE_ADD = {
            "花杠后胡": 3,
            "点炮": 1,
            "明杠": 1,
            "暗杠": 2,
            "首轮跟牌": 1
        };

        // ==================== 游戏核心状态 ====================
        let gameState = {
            ga: 0, // 玩家选择的噶数
            aiGa: [4,5,3], // AI噶数
            allTiles: [],
            playerHand: [],
            playerFlowers: [],
            aiHands: [[],[],[]],
            aiFlowers: [[],[],[]],
            discardPile: [],
            remainingTiles: 144,
            currentTurn: 0, // 0:自己, 1-3:AI
            selectedTile: null,
            gameStarted: false,
            lastDiscard: null,
            zhuang: 0 // 庄家位置（0:自己）
        };

        // ==================== DOM元素 ====================
        const gaModal = document.getElementById('gaModal');
        const tableContainer = document.getElementById('tableContainer');
        const settleModal = document.getElementById('settleModal');
        const playerHandEl = document.getElementById('playerHand');
        const discardAreaEl = document.getElementById('discardArea');
        const wallCountEl = document.getElementById('wallCount');
        const wallTimerEl = document.getElementById('wallTimer');

        const gaButtons = document.querySelectorAll('.ga-btn');
        const confirmGaBtn = document.getElementById('confirmGa');
        const nextGameBtn = document.getElementById('nextGame');

        const actionButtons = {
            chi: document.getElementById('btnChi'),
            peng: document.getElementById('btnPeng'),
            gang: document.getElementById('btnGang'),
            hu: document.getElementById('btnHu'),
            guo: document.getElementById('btnGuo')
        };

        // ==================== 工具函数 ====================
        // 生成144张牌
        function generateAllTiles() {
            const tiles = [];
            SUITS.forEach(suit => {
                NUMBERS.forEach(num => tiles.push(...Array(4).fill(`${num}${suit}`)));
            });
            HONORS.forEach(honor => tiles.push(...Array(4).fill(honor)));
            tiles.push(...FLOWERS);
            return tiles;
        }

        // 洗牌
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // 排序手牌
        function sortHand(hand) {
            const sortOrder = t => {
                if (t.endsWith('万')) return 0 * 100 + parseInt(t);
                if (t.endsWith('筒')) return 1 * 100 + parseInt(t);
                if (t.endsWith('条')) return 2 * 100 + parseInt(t);
                return 3 * 100 + HONORS.indexOf(t);
            };
            return hand.sort((a,b) => sortOrder(a) - sortOrder(b));
        }

        // 渲染手牌
        function renderPlayerHand() {
            playerHandEl.innerHTML = '';
            gameState.playerHand.forEach(tile => {
                const tileEl = document.createElement('div');
                tileEl.className = 'tile';
                tileEl.textContent = tile;
                tileEl.dataset.tile = tile;
                tileEl.addEventListener('click', () => selectTile(tile));
                if (gameState.selectedTile === tile) {
                    tileEl.classList.add('selected');
                }
                playerHandEl.appendChild(tileEl);
            });
        }

        // 选中牌
        function selectTile(tile) {
            if (gameState.currentTurn !== 0) return;
            gameState.selectedTile = gameState.selectedTile === tile ? null : tile;
            renderPlayerHand();
            actionButtons.chi.disabled = !gameState.selectedTile;
        }

        // 渲染牌池
        function renderDiscardPile() {
            discardAreaEl.innerHTML = '';
            gameState.discardPile.forEach(tile => {
                const tileEl = document.createElement('div');
                tileEl.className = 'tile';
                tileEl.textContent = tile;
                discardAreaEl.appendChild(tileEl);
            });
        }

        // 倒计时
        function startTimer(seconds) {
            let time = seconds;
            wallTimerEl.textContent = time;
            const timer = setInterval(() => {
                time--;
                wallTimerEl.textContent = time;
                if (time <= 0) {
                    clearInterval(timer);
                    // 自动过
                }
            }, 1000);
        }

        // ==================== 游戏流程 ====================
        // 噶数选择
        let selectedGa = 0;
        gaButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                gaButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedGa = parseInt(btn.dataset.ga);
            });
        });

        confirmGaBtn.addEventListener('click', () => {
            gameState.ga = selectedGa;
            document.getElementById('gaBottom').textContent = selectedGa === 0 ? '无噶' : `${selectedGa}噶`;
            gaModal.style.display = 'none';
            tableContainer.style.display = 'block';
            startGame();
        });

        // 开始游戏
        function startGame() {
            // 初始化
            gameState.allTiles = shuffleArray(generateAllTiles());
            gameState.playerHand = [];
            gameState.playerFlowers = [];
            gameState.aiHands = [[],[],[]];
            gameState.aiFlowers = [[],[],[]];
            gameState.discardPile = [];
            gameState.remainingTiles = 144;
            gameState.currentTurn = 0;
            gameState.selectedTile = null;
            gameState.gameStarted = true;
            gameState.lastDiscard = null;

            // 发牌（每人13张，庄家14张）
            for (let i = 0; i < 13; i++) {
                // 玩家
                const tile = gameState.allTiles.pop();
                if (FLOWERS.includes(tile)) gameState.playerFlowers.push(tile);
                else gameState.playerHand.push(tile);
                // AI1
                const ai1Tile = gameState.allTiles.pop();
                if (FLOWERS.includes(ai1Tile)) gameState.aiFlowers[0].push(ai1Tile);
                else gameState.aiHands[0].push(ai1Tile);
                // AI2
                const ai2Tile = gameState.allTiles.pop();
                if (FLOWERS.includes(ai2Tile)) gameState.aiFlowers[1].push(ai2Tile);
                else gameState.aiHands[1].push(ai2Tile);
                // AI3
                const ai3Tile = gameState.allTiles.pop();
                if (FLOWERS.includes(ai3Tile)) gameState.aiFlowers[2].push(ai3Tile);
                else gameState.aiHands[2].push(ai3Tile);
            }
            // 庄家多摸一张
            const extraTile = gameState.allTiles.pop();
            if (FLOWERS.includes(extraTile)) gameState.playerFlowers.push(extraTile);
            else gameState.playerHand.push(extraTile);

            gameState.remainingTiles = gameState.allTiles.length;
            wallCountEl.textContent = gameState.remainingTiles;

            // 排序手牌
            gameState.playerHand = sortHand(gameState.playerHand);
            renderPlayerHand();
            renderDiscardPile();

            // 启动倒计时
            startTimer(10);
            actionButtons.hu.disabled = false;
        }

        // 下一回合
        function nextTurn() {
            gameState.currentTurn = (gameState.currentTurn + 1) % 4;
            if (gameState.currentTurn === 0) {
                // 玩家回合：摸牌
                if (gameState.remainingTiles <= 0) {
                    endGame(null);
                    return;
                }
                const tile = gameState.allTiles.pop();
                gameState.remainingTiles = gameState.allTiles.length;
                wallCountEl.textContent = gameState.remainingTiles;

                if (FLOWERS.includes(tile)) {
                    gameState.playerFlowers.push(tile);
                } else {
                    gameState.playerHand.push(tile);
                    gameState.playerHand = sortHand(gameState.playerHand);
                }

                renderPlayerHand();
                startTimer(10);
                actionButtons.hu.disabled = false;
            } else {
                // AI回合：随机打牌
                setTimeout(() => {
                    const aiHand = gameState.aiHands[gameState.currentTurn - 1];
                    const randomIndex = Math.floor(Math.random() * aiHand.length);
                    const tile = aiHand[randomIndex];
                    gameState.discardPile.push(tile);
                    gameState.aiHands[gameState.currentTurn - 1].splice(randomIndex, 1);
                    gameState.lastDiscard = tile;

                    renderDiscardPile();
                    nextTurn();
                }, 1500);
            }
        }

        // 结束游戏
        function endGame(huResult) {
            gameState.gameStarted = false;
            settleModal.style.display = 'flex';
            if (huResult) {
                const multi = (gameState.ga + 1) * HAND_MULTIPLIER[huResult.type];
                const score = BASE_SCORE * multi;
                document.getElementById('settleTitle').textContent = '胡牌！';
                document.getElementById('settleMulti').textContent = `再赢${multi}倍`;
                document.getElementById('settleScore').textContent = `得分：${score / 10000}万`;
            } else {
                document.getElementById('settleTitle').textContent = '荒庄！';
                document.getElementById('settleMulti').textContent = '';
                document.getElementById('settleScore').textContent = '本局无得分';
            }
        }

        // 下一局
        nextGameBtn.addEventListener('click', () => {
            settleModal.style.display = 'none';
            gaModal.style.display = 'flex';
        });

        // ==================== 操作按钮绑定 ====================
        actionButtons.chi.addEventListener('click', () => {
            // 吃牌逻辑（后续补全）
            nextTurn();
        });
        actionButtons.peng.addEventListener('click', () => {
            // 碰牌逻辑（后续补全）
            nextTurn();
        });
        actionButtons.gang.addEventListener('click', () => {
            // 杠牌逻辑（后续补全）
            nextTurn();
        });
        actionButtons.hu.addEventListener('click', () => {
            // 胡牌判定（后续补全严格番数校验）
            endGame({type: "平胡"});
        });
        actionButtons.guo.addEventListener('click', () => {
            nextTurn();
        });
    </script>
</body>
</html>
