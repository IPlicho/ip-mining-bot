<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海南麻将 - 真实互动版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c1222;color:#fff;font-family:sans-serif;padding-bottom:140px}
.page{display:none;padding:16px}
.show{display:block}

/* 顶部 */
.top-bar{background:#131a2d;padding:14px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:#10b981;color:#fff;font-weight:bold;margin-top:8px}
.btn-blue{background:#3b82f6}
.btn-red{background:#ef4444}

/* 麻将牌样式 */
.mj-container{text-align:center;margin:10px 0}
.mj-pai{
  display:inline-flex;
  width:42px;
  height:60px;
  background:#fff;
  color:#222;
  margin:2px;
  border-radius:6px;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
}
.mj-pai.selected{background:#93c5fd}

/* 桌面牌堆 */
.desk{background:#131a2d;padding:20px;border-radius:16px;margin:10px 0;text-align:center;min-height:80px}

/* 底部操作栏 */
.operate{position:fixed;bottom:0;left:0;right:0;background:#131a2d;padding:12px;border-top:1px solid #1e293b}
.operate-row{display:flex;gap:8px;margin-bottom:8px}
.operate-btn{flex:1;padding:12px;border-radius:8px;border:none;background:#10b981;color:#fff;font-weight:bold}
</style>
</head>
<body>

<!-- 游戏大厅 -->
<div id="hall" class="page show">
  <div class="top-bar">
    <div>🀄 海南麻将</div>
    <div>用户：<span id="uname"></span></div>
  </div>
  <button class="btn" onclick="startGame()">开始游戏（机器人陪玩）</button>
</div>

<!-- 真实麻将游戏界面 -->
<div id="majiang" class="page">
  <div class="top-bar">
    <div>海南麻将 - 对局中</div>
    <button class="btn-blue" style="width:auto;padding:8px 12px" onclick="backHall()">退出</button>
  </div>

  <div class="desk" id="desk">桌面：</div>

  <div style="text-align:center;margin:10px 0">
    <div>我的手牌：</div>
  </div>
  <div id="my-hand" class="mj-container"></div>

  <div class="operate">
    <div class="operate-row">
      <button class="operate-btn" id="mo-btn" onclick="moPai()">摸牌</button>
      <button class="operate-btn" id="chu-btn" onclick="chuPai()" disabled>出牌</button>
    </div>
    <div class="operate-row">
      <button class="operate-btn" onclick="peng()">碰</button>
      <button class="operate-btn" onclick="gang()">杠</button>
      <button class="operate-btn" onclick="hu()">胡</button>
    </div>
  </div>
</div>

<script>
let user = "玩家"
let myHand = []
let selected = null
let desk = []

// 初始化牌库（海南麻将简化：万条筒 + 字）
const allCards = [
  "1万","2万","3万","4万","5万","6万","7万","8万","9万",
  "1条","2条","3条","4条","5条","6条","7条","8条","9条",
  "1筒","2筒","3筒","4筒","5筒","6筒","7筒","8筒","9筒",
  "东","南","西","北","中","发","白"
]

// 显示页面
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'))
  document.getElementById(id).classList.add('show')
}

// 开始游戏
function startGame(){
  initHand()
  showPage('majiang')
  renderHand()
}

// 初始化13张牌
function initHand(){
  myHand = []
  for(let i=0;i<13;i++){
    let r = Math.floor(Math.random()*allCards.length)
    myHand.push(allCards[r])
  }
  myHand.sort()
}

// 渲染手牌
function renderHand(){
  let dom = document.getElementById('my-hand')
  dom.innerHTML = ''
  myHand.forEach((p,idx)=>{
    let el = document.createElement('div')
    el.className = 'mj-pai'
    el.innerText = p
    el.onclick = ()=>{selectPai(idx)}
    dom.appendChild(el)
  })
}

// 选牌
function selectPai(idx){
  selected = idx
  let els = document.querySelectorAll('.mj-pai')
  els.forEach((e,i)=>e.classList.toggle('selected',i===idx))
  document.getElementById('chu-btn').disabled = false
}

// 摸牌
function moPai(){
  let r = Math.floor(Math.random()*allCards.length)
  myHand.push(allCards[r])
  myHand.sort()
  renderHand()
  document.getElementById('mo-btn').disabled = true
  document.getElementById('chu-btn').disabled = false
  
  // 机器人AI摸牌后行动（高胜率）
  setTimeout(robotAction,800)
}

// 出牌
function chuPai(){
  if(selected==null)return
  let chu = myHand.splice(selected,1)[0]
  desk.push(chu)
  document.getElementById('desk').innerText = "桌面："+desk.join(' ')
  selected = null
  renderHand()
  document.getElementById('mo-btn').disabled = false
  document.getElementById('chu-btn').disabled = true
}

// 机器人AI（高胜率、会胡牌）
function robotAction(){
  document.getElementById('desk').innerText += " → 机器人出牌"
  if(Math.random()<0.75){
    alert("❌ 机器人【胡牌】！\n（海南麻将：258做将 + 有番可胡）")
    backHall()
  }
}

function peng(){alert("碰了")}
function gang(){alert("杠了")}
function hu(){alert("✅ 你胡牌了！")}
function backHall(){showPage('hall')}

// 初始化
document.getElementById('uname').innerText = "玩家"
</script>
</body>
</html>
