<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>个人中心</title>
<style>
  body{background:#f5f5f5;margin:0;padding:0;font-family:"Microsoft YaHei"}
  .header{background:#1a73e8;color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center}
  .container{max-width:800px;margin:20px auto;padding:15px}
  .card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
  table{width:100%;border-collapse:collapse;margin-top:15px}
  th,td{border:1px solid #ddd;padding:10px;text-align:center}
  th{background:#f0f0f0}
  button{padding:10px 15px;border:none;background:#1a73e8;color:#fff;border-radius:6px;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<div class="header">
  <h2>个人中心</h2>
  <a href="index.html" style="color:#fff;text-decoration:none">返回大厅</a>
</div>

<div class="container">
  <div class="card">
    <h3>我的账户</h3>
    <p>用户名：李永发</p>
    <p>用户ID：564511</p>
    <p>当前余额：<strong id="userMoney">10000</strong> 金币</p>
    <button onclick="addTestMoney()">+1000测试金币</button>
  </div>

  <div class="card">
    <h3>资金明细</h3>
    <table>
      <tr>
        <th>时间</th>
        <th>类型</th>
        <th>金额</th>
        <th>备注</th>
      </tr>
      <tbody id="detailList">
      </tbody>
    </table>
  </div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('mahjongUser')) || { money: 10000, details: [] };

function updateUI(){
  document.getElementById('userMoney').innerText = user.money;
  const list = document.getElementById('detailList');
  list.innerHTML = '';
  user.details.forEach(item => {
    list.innerHTML += `
      <tr>
        <td>${item.time}</td>
        <td>${item.type}</td>
        <td>${item.amount}</td>
        <td>${item.desc}</td>
      </tr>
    `;
  });
}

function addTestMoney(){
  user.money += 1000;
  user.details.push({
    time: new Date().toLocaleString(),
    type: "+",
    amount: 1000,
    desc: "测试充值"
  });
  localStorage.setItem('mahjongUser', JSON.stringify(user));
  updateUI();
}

updateUI();
</script>
</body>
</html>
