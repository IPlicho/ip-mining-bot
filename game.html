<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房间 {{rid}}</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        body{background:#27ae60;color:white;padding:1rem}
        .tile{width:44px;height:60px;background:white;color:black;display:inline-block;text-align:center;line-height:60px;margin:2px;border-radius:6px}
        .hand{margin-top:20px}
        button{width:100%;padding:1rem;background:white;color:#27ae60;border:none;border-radius:10px;margin-top:10px}
    </style>
</head>
<body>
<h3>{{room.name}} 入场：{{room.cost}}积分</h3>
<div id="discards"></div>
<div class="hand" id="hand"></div>
<button onclick="start()">开始游戏</button>

<script>
const rid = "{{rid}}";
const socket = io();
socket.emit("login", {uid:localStorage.uid});

function start(){
    socket.emit("enter", {rid:rid, uid:localStorage.uid});
    socket.emit("start", rid);
}

socket.on("hand", (hand)=>{
    document.getElementById("hand").innerHTML = hand.map(t=>
        `<div class='tile' onclick='discard("${t}")'>${t}</div>`
    ).join("");
})

function discard(tile){
    socket.emit("discard", {rid:rid, tile:tile});
}

socket.on("show", (d)=>{
    document.getElementById("discards").innerHTML += `<div class='tile'>${d.tile}</div>`;
})
</script>
</body>
</html>
