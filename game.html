<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>口红机闯关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei"}
body{background:#1a1a2e;color:#fff;overflow:hidden}
#game{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify:center}
#title{font-size:22px;margin-bottom:10px}
#tip{font-size:14px;color:#ccc;margin-bottom:20px}
#price-box{display:flex;gap:15px;margin-bottom:20px}
.price-btn{padding:12px 24px;border-radius:8px;border:none;font-size:16px;font-weight:bold}
.btn-8{background:#28a745;color:#fff}
.btn-18{background:#ff7700;color:#fff}
#wheel-box{position:relative;width:280px;height:280px;margin:20px 0}
#wheel{width:280px;height:280px;border-radius:50%;background:#fff;position:relative;transition:transform 0.05s linear}
.center{position:absolute;top:50%;left:50%;width:80px;height:80px;background:#ffeb3b;border-radius:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify:center;color:#333;font-weight:bold}
.lipstick{position:absolute;width:6px;height:85px;background:#e63975;left:50%;top:0;transform-origin:bottom center;border-radius:3px}
#launcher{width:12px;height:60px;background:#e63975;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);border-radius:6px}
#result{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.8);display:none;align-items:center;justify:center}
.result-box{background:#fff;color:#333;padding:30px;border-radius:12px;text-align:center}
.result-box h2{margin-bottom:10px}
.result-box .btn{margin-top:20px;padding:10px 20px;background:#28a745;color:#fff;border:none;border-radius:8px}
</style>
</head>
<body>
<div id="game">
  <div id="title">口红机闯关 · 3关通关领奖</div>
  <div id="tip">点击发射口红 · 碰到即失败</div>
  <div id="price-box">
    <button class="price-btn btn-8" onclick="start(8)">8元玩法(奖品100内)</button>
    <button class="price-btn btn-18" onclick="start(18)">18元玩法(奖品200内)</button>
  </div>
  <div id="wheel-box">
    <div id="wheel">
      <div class="center">口红机</div>
    </div>
    <div id="launcher"></div>
  </div>
</div>
<div id="result">
  <div class="result-box">
    <h2 id="res-title"></h2>
    <p id="res-msg"></p>
    <button class="btn" onclick="closeResult()">确定</button>
  </div>
</div>
<script>
let price = 0;
let level = 1;
let spinning = false;
let canShoot = false;
let lipAngles = [];
let wheel = document.getElementById('wheel');
let res = document.getElementById('result');
let rot = 0;

function start(p){
  price = p;
  level = 1;
  lipAngles = [];
  canShoot = true;
  spinning = true;
  runWheel();
}

function runWheel(){
  setInterval(()=>{
    if(!spinning) return;
    rot += 2 + level*0.8;
    wheel.style.transform = `rotate(${rot}deg)`;
  },20)
}

document.addEventListener('click',()=>{
  if(!canShoot) return;
  let now = rot % 360;
  for(let a of lipAngles){
    if(Math.abs((now-a+360)%360) < 18){
      showResult("游戏失败","口红碰到一起了！");
      canShoot = false;
      return;
    }
  }
  lipAngles.push(now);
  let el = document.createElement('div');
  el.className = 'lipstick';
  el.style.transform = `rotate(${now}deg)`;
  wheel.appendChild(el);
  if(lipAngles.length >= 12 + level*2){
    if(level >=3){
      showResult("恭喜通关","可以挑选奖品！");
      canShoot = false;
    }else{
      level++;
      lipAngles = [];
      showResult("第"+(level-1)+"关通关","进入第"+level+"关！");
    }
  }
})

function showResult(t,m){
  document.getElementById('res-title').innerText = t;
  document.getElementById('res-msg').innerText = m;
  res.style.display = 'flex';
}
function closeResult(){
  res.style.display = 'none';
}
</script>
</body>
</html>
