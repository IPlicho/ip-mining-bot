<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>口红机闯关 · 3关通关领奖</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", Arial, sans-serif;
}
body {
  background: #1a1a2e; /* 纯深紫背景，完全按你的图 */
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  overflow: hidden;
}
#game-container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
  text-align: center;
}
#game-title {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #fff;
}
#game-tip {
  font-size: 18px;
  color: #ccc;
  margin-bottom: 25px;
}
#price-select {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
  justify-content: center;
}
.price-btn {
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn-18 {
  background: #28a745; /* 绿色按钮，按你的图 */
  color: #fff;
}
.btn-38 {
  background: #fd7e14; /* 橙色按钮，按你的图 */
  color: #fff;
}
.btn-68 {
  background: #c44569; /* 玫红按钮，对应68元 */
  color: #fff;
}
.price-btn:active {
  transform: scale(0.95);
}
#top-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding: 0 10px;
}
#left-count {
  font-size: 28px;
  font-weight: bold;
  color: #ff6b9d; /* 粉色，按你的图 */
}
#level-info {
  font-size: 28px;
  font-weight: bold;
  color: #ffd700; /* 黄色，按你的图 */
}
#wheel-wrap {
  position: relative;
  width: 360px;
  height: 360px;
  margin: 0 auto 30px;
}
#wheel {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: #fff; /* 白色外圈，按你的图 */
  position: relative;
  overflow: hidden;
  border: 8px solid #fff;
}
.wheel-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 340px;
  height: 340px;
  border-radius: 50%;
  background: #2d5016; /* 绿色瓜皮环，按你的图 */
  z-index: 2;
}
.wheel-flesh {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: #e55353; /* 红色瓜瓤，按你的图 */
  z-index: 3;
}
.wheel-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 120px;
  height: 120px;
  background: #f9d71c; /* 黄色中心圆，按你的图 */
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
  color: #333;
  z-index: 10;
  transform: translate(-50%, -50%) rotate(90deg); /* 文字竖排，按你的图 */
}
.lipstick {
  position: absolute;
  width: 16px;
  height: 140px;
  background: #e63975; /* 纯粉色口红，按你的图 */
  left: 50%;
  top: 0;
  transform-origin: bottom center;
  border-radius: 8px;
  z-index: 5;
}
#launcher {
  position: absolute;
  bottom: -15px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 80px;
  background: #e63975; /* 纯粉色发射口红，按你的图 */
  border-radius: 10px;
  z-index: 5;
}
#result-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.8);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.result-box {
  background: #fff;
  color: #333;
  padding: 35px;
  border-radius: 16px;
  text-align: center;
  max-width: 320px;
  animation: pop 0.3s ease;
}
@keyframes pop {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.result-box h2 {
  font-size: 26px;
  margin-bottom: 15px;
}
.result-box p {
  font-size: 18px;
  margin-bottom: 25px;
  color: #666;
}
.result-btn {
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn-retry {
  background: #28a745;
  color: #fff;
}
.btn-close {
  background: #6c757d;
  color: #fff;
  margin-left: 10px;
}
.result-btn:active {
  transform: scale(0.95);
}
</style>
</head>
<body>
<div id="game-container">
  <h1 id="game-title">口红机闯关 · 3关通关领奖</h1>
  <p id="game-tip">点击发射口红 · 碰到即失败</p>
  
  <div id="price-select">
    <button class="price-btn btn-18" onclick="startGame(18)">18元玩法(奖品100内)</button>
    <button class="price-btn btn-38" onclick="startGame(38)">38元玩法(奖品200内)</button>
    <button class="price-btn btn-68" onclick="startGame(68)">68元玩法(奖品200+)</button>
  </div>
  
  <div id="top-info">
    <div id="left-count">剩余口红：12/12</div>
    <div id="level-info">第1关</div>
  </div>
  
  <div id="wheel-wrap">
    <div id="wheel">
      <div class="wheel-ring"></div>
      <div class="wheel-flesh"></div>
      <div class="wheel-center">口红机</div>
      <div id="launcher"></div>
    </div>
  </div>
</div>
