<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>口红机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif}
body{background:#f9f9f9}
.container{max-width:414px;margin:0 auto;background:#fff;height:100vh;position:relative;overflow:hidden}
.header{padding:20px;display:flex;justify-content:space-between;align-items:center;background:#fff}
.logo{font-size:20px;font-weight:bold;color:#ff4060}
.user{font-size:14px;color:#666}
.game-area{position:relative;width:320px;height:320px;margin:30px auto}
.wheel{
  width:320px;height:320px;border-radius:50%;
  background:radial-gradient(circle at center, #ffb6c1 0%, #ff8699 45%, #ff5977 45%, #ff4060 100%);
  border:8px solid #fff;box-shadow:0 0 20px rgba(255,64,96,0.2);
  position:relative;overflow:hidden
}
.center-dot{
  width:80px;height:80px;background:#fff;border-radius:50%;
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  box-shadow:0 0 10px rgba(0,0,0,0.1)
}
.lipstick{
  position:absolute;width:16px;height:145px;background:#ff4060;
  left:50%;top:0;transform-origin:bottom center;border-radius:8px 8px 4px 4px;
}
.shooter{
  width:22px;height:90px;background:#ff4060;border-radius:11px;
  position:absolute;bottom:-30px;left:50%;transform:translateX(-50%);
  box-shadow:0 4px 10px rgba(255,64,96,0.3)
}
.info-bar{display:flex;justify-content:space-between;padding:0 30px;margin-top:20px}
.life{font-size:16px;color:#ff4060;font-weight:bold}
.level{font-size:16px;color:#ff9f40;font-weight:bold}
.mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center}
.pop{background:#fff;border-radius:20px;padding:40px;text-align:center;width:280px}
.pop h2{margin-bottom:10px;color:#ff4060}
.pop p{margin-bottom:20px;color:#666}
.pop button{
  background:#ff4060;color:#fff;border:none;border-radius:12px;padding:14px 0;width:100%;
  font-size:16px;font-weight:bold
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">口红机</div>
    <div class="user">ID:888888</div>
  </div>
  <div class="info-bar">
    <div class="life">剩余：<span id="left">12</span></div>
    <div class="level">第<span id="lv">1</span>关</div>
  </div>
  <div class="game-area">
    <div class="wheel" id="wheel">
      <div class="center-dot"></div>
      <div class="shooter"></div>
    </div>
  </div>
</div>
<div class="mask" id="mask">
  <div class="pop">
    <h2 id="title"></h2>
    <p id="msg"></p>
    <button onclick="restart()">再来一次</button>
  </div>
</div>
<script>
const levels = [12,16,20]
let curLv = 0
let left = levels[curLv]
let angles = []
let rot = 0
let spinning = true
let canShoot = true

const wheel = document.getElementById('wheel')
const leftEl = document.getElementById('left')
const lvEl = document.getElementById('lv')
const mask = document.getElementById('mask')
const title = document.getElementById('title')
const msg = document.getElementById('msg')

setInterval(()=>{
  if(!spinning) return
  rot += 2.4 + curLv * 0.9
  wheel.style.transform = `rotate(${rot}deg)`
},20)

document.addEventListener('click',()=>{
  if(!canShoot || left <= 0) return
  const now = rot % 360
  for(let a of angles){
    const d = Math.abs((now - a + 360) % 360)
    if(d < 17){
      show('游戏失败','口红碰到了')
      spinning = false
      canShoot = false
      return
    }
  }
  angles.push(now)
  const el = document.createElement('div')
  el.className = 'lipstick'
  el.style.transform = `rotate(${now}deg)`
  wheel.appendChild(el)
  left--
  leftEl.innerText = left
  if(left <= 0){
    if(curLv >= 2){
      show('恭喜通关','获得奖品')
      spinning = false
      canShoot = false
    }else{
      curLv++
      left = levels[curLv]
      angles = []
      document.querySelectorAll('.lipstick').forEach(e=>e.remove())
      lvEl.innerText = curLv+1
      leftEl.innerText = left
      show('过关','进入下一关')
    }
  }
})

function show(t,m){
  title.innerText = t
  msg.innerText = m
  mask.style.display = 'flex'
}
function restart(){
  mask.style.display = 'none'
  curLv = 0
  left = levels[curLv]
  angles = []
  rot = 0
  spinning = true
  canShoot = true
  document.querySelectorAll('.lipstick').forEach(e=>e.remove())
  lvEl.innerText = 1
  leftEl.innerText = left
}
</script>
</body>
</html>
